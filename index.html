<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Faa Tong</title>
    
    <!-- Google AdSense Verification Tag -->
    <meta name="google-adsense-account" content="ca-pub-5654868401976691">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-color: #0984e3;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --code-bg: #f1f2f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 800px; 
            width: 100%;
        }

        .profile-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 2rem;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1rem;
            font-weight: 300;
        }

        /* Markdown Content Styling */
        .markdown-body {
            text-align: left; 
            line-height: 1.7;
            font-size: 1rem;
            color: var(--text-main);
        }

        /* Loading state styling */
        .loading-text {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            display: block;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5rem;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3rem;
        }

        .markdown-body code {
            font-family: 'Fira Code', monospace;
            background-color: var(--code-bg);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background-color: #2d3436;
            color: #dfe6e9;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
        }

        .markdown-body pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }

        .markdown-body a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #b2bec3;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-header">
            <img src="https://github.com/minfaatong.png" alt="Min Faa Tong" class="profile-img">
            <h1>Min Faa Tong</h1>
            <p class="bio">Welcome to my digital space.</p>
        </div>

        <!-- Loading text is now INSIDE the div -->
        <div id="content" class="markdown-body">
            <span class="loading-text">Loading content...</span>
        </div>

        <footer>
            &copy; <span id="year"></span> Min Faa Tong
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function renderMarkdown() {
            const url = 'https://raw.githubusercontent.com/minfaatong/minfaatong.github.io/refs/heads/master/README.md';
            const contentDiv = document.getElementById('content');
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch README');
                
                const markdownText = await response.text();
                
                // This line completely replaces the "Loading content..." span with the rendered HTML
                contentDiv.innerHTML = marked.parse(markdownText);
            } catch (error) {
                contentDiv.innerHTML = `<p style="color: red; text-align: center;">Error loading content: ${error.message}</p>`;
            }
        }

        renderMarkdown();
    </script>

</body>
</html>
